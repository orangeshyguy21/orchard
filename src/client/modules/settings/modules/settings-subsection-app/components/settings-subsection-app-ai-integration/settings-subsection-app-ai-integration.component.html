<div class="flex flex-gap-2 p-1 flex-wrap">
	<div [formGroup]="form_group()" class="flex-1 flex flex-column">
		<div class="flex flex-items-center flex-grow flex-gap-1" animate.enter="orc-animation-fadein">
			<div class="flex flex-items-center flex-grow flex-gap-1">
				<orc-form-toggle
					class="flex-1 w-min-10 h-min-6"
					[selected]="!form_group().get('enabled')?.value"
					(click)="toggleAIEnabled(false)"
				>
					<div class="ai-sticker">
						<mat-icon class="icon-lg mat-symbol-outline">block</mat-icon>
					</div>
					<div class="ai-label">
						<div class="font-size-s">Disabled</div>
						<div class="font-size-xs orc-outline-color">No price data</div>
					</div>
				</orc-form-toggle>
				<orc-form-toggle
					class="flex-1 w-min-10 h-min-6"
					[selected]="form_group().get('enabled')?.value"
					(click)="toggleAIEnabled(true)"
				>
					<div class="ai-sticker">
						<mat-icon class="icon-lg mat-symbol-outline">spa</mat-icon>
					</div>
					<div class="ai-label">
						<div class="font-size-s">Enabled</div>
						<div class="font-size-xs orc-outline-color">Price data available</div>
					</div>
				</orc-form-toggle>
			</div>

			<button type="button" tabindex="-1" mat-icon-button class="orc-icon-button" (click)="help_status.set(!help_status())">
				<mat-icon class="orc-outline-color">info</mat-icon>
			</button>
		</div>
		<div class="orc-animation-expand-collapse" [class.animation-expanded]="help_status()">
			<div class="orc-animation-expand-collapse-inner">
				<div class="flex p-t-2 p-b-1 w-max-36">
					<orc-form-help-text class="orc-surface-container-high-bg">
						help text
					</orc-form-help-text>
				</div>
			</div>
		</div>
        <div class="balance-sheet-details orc-animation-expand-collapse" [class.animation-expanded]="form_group().get('enabled')?.value">
            <div class="orc-animation-expand-collapse-inner p-t-1">
                <mat-tab-group>
                    <mat-tab>
                        <ng-template mat-tab-label>
                            <div class="ai-vendor-label">
                                <div class="ai-vendor-logo">
                                    <img src="ollama.png" alt="Ollama" />
                                </div>
                                <div class="ai-vendor-text">
                                    <span class="ai-vendor-label-name">Ollama</span>
                                    <span class="ai-vendor-label-desc">Local AI models</span>
                                </div>
                            </div>
                        </ng-template>
                        Content 1
                    </mat-tab>
                    <mat-tab>
                        <ng-template mat-tab-label>
                            <div class="ai-vendor-label">
                                <div class="ai-vendor-logo">
                                    <img src="openrouter.png" alt="OpenRouter" />
                                </div>
                                <div class="ai-vendor-text">
                                    <span class="ai-vendor-label-name">OpenRouter</span>
                                    <span class="ai-vendor-label-desc">Cloud AI routing</span>
                                </div>
                            </div>
                        </ng-template>
                        Content 2
                    </mat-tab>
                </mat-tab-group>
            </div>
        </div>
	</div>
