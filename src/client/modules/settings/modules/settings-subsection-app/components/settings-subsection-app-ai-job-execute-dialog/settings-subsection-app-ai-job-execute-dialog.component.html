<h2 mat-dialog-title>{{ data.name }}</h2>
<mat-dialog-content>
	<div class="execute-dialog-content">
		@if (loading()) {
			<div class="flex flex-column flex-items-center flex-justify-center p-2">
				<mat-spinner diameter="40"></mat-spinner>
			</div>
		} @else if (error()) {
			<div class="flex flex-column flex-gap-1 flex-items-center p-2">
				<mat-icon class="mat-symbol-outline orc-status-error-color icon-lg">error</mat-icon>
				<div class="text-center">{{ error() }}</div>
			</div>
		} @else if (marked_result()) {
			<div class="orc-ai-marked" [innerHTML]="marked_result()"></div>
		}
	</div>
</mat-dialog-content>
<mat-dialog-actions>
	<button mat-button mat-dialog-close cdkFocusInitial>Close</button>
</mat-dialog-actions>
