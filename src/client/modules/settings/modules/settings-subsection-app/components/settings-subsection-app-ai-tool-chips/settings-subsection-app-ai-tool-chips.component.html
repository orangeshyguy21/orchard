@if (tools().length) {
	<div class="flex flex-gap-0-5 flex-wrap">
		@for (tool of tools(); track tool.category) {
			<div class="tool-chip" [class.tool-unavailable]="!tool.available" [matTooltip]="tool.reason ?? ''">
				<div class="category-circle">
					@switch (tool.category) {
						@case ('bitcoin') {
							<mat-icon [svgIcon]="tool.icon"></mat-icon>
						}
						@default {
							<mat-icon>{{ tool.icon }}</mat-icon>
						}
					}
				</div>
				<span>{{ tool.count }}</span>
			</div>
		}
	</div>
}
