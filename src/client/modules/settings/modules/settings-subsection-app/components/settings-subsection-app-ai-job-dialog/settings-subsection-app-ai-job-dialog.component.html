<mat-dialog-content>
	<div class="flex flex-column flex-gap-1 flex-items-center p-2">
		<mat-icon class="mat-symbol-outline orc-status-warning-color icon-lg">delete_forever</mat-icon>
		<div class="text-center">Are you sure you want to delete <strong>{{ data.name }}</strong>?<br>This will remove all run history and cannot be undone.</div>
	</div>
</mat-dialog-content>
<mat-dialog-actions>
	<button mat-button mat-dialog-close>Cancel</button>
	<button mat-button [mat-dialog-close]="true" cdkFocusInitial>Delete</button>
</mat-dialog-actions>
