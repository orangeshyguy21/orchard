# Config: lnd + nutshell + sqlite
#
# Topology:
#   lnd-alice ⇄ lnd-orchard ⇄ lnd-bob     (no direct alice⇄bob channel)
#   nutshell backend: lnd-orchard (via REST)
#   orchard mintdb target: sqlite

name: orchard-e2e-lnd-nutshell-sqlite

networks:
  net:
    name: orchard-e2e-lnd-nutshell-sqlite
    driver: bridge

volumes:
  bitcoind-data:
  bitcoind-peer-data:
  lnd-orchard-data:
  lnd-alice-data:
  lnd-bob-data:
  nutshell-data:
  orchard-data:
  wallet-data:
  shared:

x-lnd-defaults: &lnd-defaults
  image: polarlightning/lnd:${LND_VERSION}
  restart: on-failure
  networks: [net]
  depends_on:
    bitcoind: { condition: service_healthy }
  healthcheck:
    test: ["CMD-SHELL", "lncli --lnddir=/home/lnd/.lnd --network=regtest getinfo > /dev/null"]
    interval: 3s
    timeout: 5s
    retries: 30

services:
  bitcoind:
    image: polarlightning/bitcoind:${BITCOIND_VERSION}
    container_name: lnd-nutshell-sqlite-bitcoind
    restart: on-failure
    networks: [net]
    ports:
      - "18443:18443"
    volumes:
      - bitcoind-data:/home/bitcoin/.bitcoin
    command: >
      -regtest
      -server=1
      -rpcbind=0.0.0.0
      -rpcallowip=0.0.0.0/0
      -rpcuser=${BTC_RPC_USER}
      -rpcpassword=${BTC_RPC_PASS}
      -rpcport=18443
      -txindex=1
      -zmqpubrawblock=tcp://0.0.0.0:28334
      -zmqpubrawtx=tcp://0.0.0.0:28335
      -fallbackfee=0.0002
      -debug=0
    healthcheck:
      test: >
        bitcoin-cli -regtest
        -rpcuser=${BTC_RPC_USER} -rpcpassword=${BTC_RPC_PASS}
        getblockchaininfo
      interval: 3s
      timeout: 5s
      retries: 30

  # Passive P2P peer. `-connect=bitcoind:18444` pins the topology — this node
  # dials the primary and never auto-discovers. Gives the UI a real peer count
  # (>0) and exercises mempool/block gossip without letting chains diverge.
  # Never mines; not referenced as an RPC target by any LN node or setup script.
  bitcoind-peer:
    image: polarlightning/bitcoind:${BITCOIND_VERSION}
    container_name: lnd-nutshell-sqlite-bitcoind-peer
    restart: on-failure
    networks: [net]
    depends_on:
      bitcoind: { condition: service_healthy }
    volumes:
      - bitcoind-peer-data:/home/bitcoin/.bitcoin
    command: >
      -regtest
      -server=1
      -rpcbind=0.0.0.0
      -rpcallowip=0.0.0.0/0
      -rpcuser=${BTC_RPC_USER}
      -rpcpassword=${BTC_RPC_PASS}
      -rpcport=18443
      -fallbackfee=0.0002
      -debug=0
      -connect=bitcoind:18444
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bitcoin-cli -regtest
          -rpcuser=${BTC_RPC_USER} -rpcpassword=${BTC_RPC_PASS}
          getpeerinfo | grep -q subver
      interval: 3s
      timeout: 5s
      retries: 30

  lnd-orchard:
    <<: *lnd-defaults
    container_name: lnd-nutshell-sqlite-lnd-orchard
    ports: ["10009:10009"]
    volumes:
      - lnd-orchard-data:/home/lnd/.lnd
    command: >
      lnd --noseedbackup --alias=orchard --externalip=lnd-orchard
      --listen=0.0.0.0:9735 --rpclisten=0.0.0.0:10009 --restlisten=0.0.0.0:8080
      --bitcoin.active --bitcoin.regtest --bitcoin.node=bitcoind
      --bitcoind.rpchost=bitcoind:18443
      --bitcoind.rpcuser=${BTC_RPC_USER} --bitcoind.rpcpass=${BTC_RPC_PASS}
      --bitcoind.zmqpubrawblock=tcp://bitcoind:28334
      --bitcoind.zmqpubrawtx=tcp://bitcoind:28335
      --tlsextradomain=lnd-orchard --tlsextradomain=localhost
      --accept-keysend --debuglevel=info

  lnd-alice:
    <<: *lnd-defaults
    container_name: lnd-nutshell-sqlite-lnd-alice
    ports: ["10019:10009"]
    volumes:
      - lnd-alice-data:/home/lnd/.lnd
    command: >
      lnd --noseedbackup --alias=alice --externalip=lnd-alice
      --listen=0.0.0.0:9735 --rpclisten=0.0.0.0:10009 --restlisten=0.0.0.0:8080
      --bitcoin.active --bitcoin.regtest --bitcoin.node=bitcoind
      --bitcoind.rpchost=bitcoind:18443
      --bitcoind.rpcuser=${BTC_RPC_USER} --bitcoind.rpcpass=${BTC_RPC_PASS}
      --bitcoind.zmqpubrawblock=tcp://bitcoind:28334
      --bitcoind.zmqpubrawtx=tcp://bitcoind:28335
      --tlsextradomain=lnd-alice --tlsextradomain=localhost
      --accept-keysend --debuglevel=info

  lnd-bob:
    <<: *lnd-defaults
    container_name: lnd-nutshell-sqlite-lnd-bob
    ports: ["10029:10009"]
    volumes:
      - lnd-bob-data:/home/lnd/.lnd
    command: >
      lnd --noseedbackup --alias=bob --externalip=lnd-bob
      --listen=0.0.0.0:9735 --rpclisten=0.0.0.0:10009 --restlisten=0.0.0.0:8080
      --bitcoin.active --bitcoin.regtest --bitcoin.node=bitcoind
      --bitcoind.rpchost=bitcoind:18443
      --bitcoind.rpcuser=${BTC_RPC_USER} --bitcoind.rpcpass=${BTC_RPC_PASS}
      --bitcoind.zmqpubrawblock=tcp://bitcoind:28334
      --bitcoind.zmqpubrawtx=tcp://bitcoind:28335
      --tlsextradomain=lnd-bob --tlsextradomain=localhost
      --accept-keysend --debuglevel=info

  setup:
    build:
      context: ../..
      dockerfile: setup.Dockerfile
    container_name: lnd-nutshell-sqlite-setup
    networks: [net]
    depends_on:
      bitcoind-peer: { condition: service_healthy }
      lnd-orchard:   { condition: service_healthy }
      lnd-alice:     { condition: service_healthy }
      lnd-bob:       { condition: service_healthy }
    volumes:
      - ../../scripts:/scripts:ro
      - lnd-orchard-data:/lnd/orchard:ro
      - lnd-alice-data:/lnd/alice:ro
      - lnd-bob-data:/lnd/bob:ro
      - shared:/shared
    environment:
      - BTC_RPC_USER=${BTC_RPC_USER}
      - BTC_RPC_PASS=${BTC_RPC_PASS}
      - CHANNEL_CAPACITY_SAT=${CHANNEL_CAPACITY_SAT:-10000000}
      - CHANNEL_PUSH_SAT=${CHANNEL_PUSH_SAT:-5000000}
    entrypoint: ["/scripts/fund-lnd-topology.sh"]
    restart: "no"

  nutshell:
    image: cashubtc/nutshell:${NUTSHELL_VERSION}
    container_name: lnd-nutshell-sqlite-nutshell
    restart: on-failure
    networks: [net]
    ports:
      - "3338:3338"
    depends_on:
      setup: { condition: service_completed_successfully }
    volumes:
      - nutshell-data:/app/data
      - lnd-orchard-data:/lnd:ro
    environment:
      - MINT_LISTEN_HOST=0.0.0.0
      - MINT_LISTEN_PORT=3338
      - MINT_BACKEND_BOLT11_SAT=LndRestWallet
      - MINT_LND_REST_ENDPOINT=https://lnd-orchard:8080
      - MINT_LND_REST_CERT=/lnd/tls.cert
      - MINT_LND_REST_MACAROON=/lnd/data/chain/bitcoin/regtest/admin.macaroon
      - MINT_DATABASE=/app/data
      - MINT_PRIVATE_KEY=${NUTSHELL_PRIVATE_KEY}
      - MINT_INFO_NAME=e2e-nutshell
      - MINT_INFO_DESCRIPTION=Orchard e2e lnd-nutshell-sqlite
      - MINT_INFO_CONTACT=[["email","e2e@orchard.local"]]
    command: >
      poetry run mint
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:3338/v1/info\").status==200 else 1)'"]
      interval: 3s
      timeout: 5s
      retries: 30

  orchard:
    build:
      context: ../../../..
      dockerfile: Dockerfile
      target: final-mintdb-sqlite
    container_name: lnd-nutshell-sqlite-orchard
    restart: on-failure
    networks: [net]
    ports:
      - "3322:3321"
    depends_on:
      nutshell: { condition: service_healthy }
    volumes:
      - orchard-data:/app/data
      - nutshell-data:/mint-data
      - lnd-orchard-data:/certs/lnd:ro
    env_file:
      - ./env
    environment:
      - NODE_ENV=production
      - DOCKER_ENV=true
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3321
      - LIGHTNING_CERT=/certs/lnd/tls.cert
      - LIGHTNING_MACAROON=/certs/lnd/data/chain/bitcoin/regtest/admin.macaroon
      - MINT_DATABASE=/mint-data/mint.sqlite3
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3321/"]
      interval: 3s
      timeout: 5s
      retries: 30

  # ──────────────────────────────────────────────────────────────
  # Wallet container — Cashu client only.
  #
  # Role: exercises the mint under test (mint → swap → melt).
  # Never runs a mint daemon, never publishes ports.
  #
  # Built from wallet.Dockerfile (cdk-cli from crates.io). Same
  # binary works against cdk-mintd or nutshell-as-mint — only the
  # depends_on target changes per config.
  #
  # Usage from scripts:
  #   docker compose exec wallet cdk-cli mint $MINT_URL 100
  #   docker compose exec wallet cdk-cli balance
  #   docker compose exec wallet cdk-cli send 10
  # ──────────────────────────────────────────────────────────────
  wallet:
    build:
      context: ../..
      dockerfile: wallet.Dockerfile
      args:
        CDK_CLI_VERSION: ${CDK_CLI_VERSION}
    container_name: lnd-nutshell-sqlite-wallet
    restart: on-failure
    networks: [net]
    depends_on:
      nutshell: { condition: service_healthy }
    volumes:
      - wallet-data:/root/.cdk
    environment:
      - MINT_URL=http://nutshell:3338
    entrypoint: ["sleep", "infinity"]

  # ──────────────────────────────────────────────────────────────
  # Activity generator — one-shot.
  #
  # After orchard is healthy, sprays a realistic mix of LN payments
  # (forwarded / inbound / outbound via orchard) and Cashu wallet
  # operations (mint / swap / melt) so the SUT has history to observe.
  #
  # Counts are env-overridable (ACTIVITY_FORWARDS, ACTIVITY_MINTS, …)
  # and the whole thing can be disabled with ACTIVITY_SKIP=1.
  #
  # Uses docker-cli (baked into setup.Dockerfile) to exec into the
  # wallet container; LN nodes are driven via REST.
  # ──────────────────────────────────────────────────────────────
  activity:
    build:
      context: ../..
      dockerfile: setup.Dockerfile
    container_name: lnd-nutshell-sqlite-activity
    networks: [net]
    depends_on:
      orchard: { condition: service_healthy }
      wallet:  { condition: service_started }
    volumes:
      - ../../scripts:/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - lnd-orchard-data:/lnd/orchard:ro
      - lnd-alice-data:/lnd/alice:ro
      - lnd-bob-data:/lnd/bob:ro
    environment:
      - CONFIG_NAME=lnd-nutshell-sqlite
      - MINT_SERVICE=nutshell
      - MINT_PORT=3338
      - BTC_RPC_USER=${BTC_RPC_USER}
      - BTC_RPC_PASS=${BTC_RPC_PASS}
      - ACTIVITY_FORWARDS=${ACTIVITY_FORWARDS:-6}
      - ACTIVITY_INBOUND=${ACTIVITY_INBOUND:-4}
      - ACTIVITY_OUTBOUND=${ACTIVITY_OUTBOUND:-4}
      - ACTIVITY_MINTS=${ACTIVITY_MINTS:-5}
      - ACTIVITY_SWAPS=${ACTIVITY_SWAPS:-4}
      - ACTIVITY_MELTS=${ACTIVITY_MELTS:-3}
      - ACTIVITY_MEMPOOL_PER_RATE=${ACTIVITY_MEMPOOL_PER_RATE:-4}
      - ACTIVITY_SKIP=${ACTIVITY_SKIP:-0}
    entrypoint: ["/scripts/activity-lnd-topology.sh"]
    restart: "no"
